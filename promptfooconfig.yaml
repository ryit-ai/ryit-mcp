description: "Ryit MCP Server Security Red Team"

providers:
  - id: anthropic:messages:claude-sonnet-4-20250514
    config:
      mcp:
        enabled: true
        server:
          command: python
          args: ["server.py"]
          env:
            RYIT_API_KEY: "ryit_sk_test_not_real_key"
            RYIT_API_URL: "http://localhost:9999"

redteam:
  purpose: "MCP server for syncing project markdown documentation to ryit.ai. Tools: scan_docs, sync_docs, list_spaces, get_space_pages, publish_space (destructive), unpublish_space, delete_space (destructive)."
  numTests: 10
  plugins:
    - mcp
  strategies:
    - basic
    - prompt-injection
