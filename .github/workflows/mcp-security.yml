name: MCP Red Team

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  redteam:
    name: Promptfoo MCP Red Team
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install fastmcp httpx python-frontmatter

      - name: Run MCP red team tests
        run: npx promptfoo@latest redteam run
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
